[project]
name = "canary"
version = "0.1.5"
description = "CANARY: Component Analytics & Near-term Advisory Risk Yardstick"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "boto3>=1.35.0",
  "requests>=2.33.0",
  "beautifulsoup4>=4.12.0",
  "google-cloud-bigquery>=3.35.0",
  "cryptography>=46.0.6",
  "numpy>=1.26",
  "scikit-learn>=1.5",
  "pandas>=2.2",
  "python-dotenv>=1.0.1",
  "pyasn1>=0.6.3",
  "waitress>=3.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-cov>=5.0.0",
  "Pygments>=2.20.0",
  "ruff>=0.6.0",
  "bandit>=1.7.9",
  "pip-audit>=2.7.3",
  "pip-tools>=7.4.1",
  "pyright>=1.1.390",
  "pre-commit",
  "atheris>=2.3.0",
]

[project.scripts]
canary = "canary.cli:main"
canary-web = "canary.webapp:main"

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["canary*"]
exclude = ["data*", "tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --cov=canary --cov-report=term-missing"

[tool.coverage.run]
branch = true
source = ["canary"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.ruff]
line-length = 100
target-version = "py311"
cache-dir = "/tmp/.ruff_cache"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pyright]
include = ["canary", "tests"]
typeCheckingMode = "basic"
reportMissingTypeStubs = "none"
