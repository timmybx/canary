# See https://pre-commit.com for more information
# To install:  pip install pre-commit && pre-commit install
# To run on all files: pre-commit run --all-files

repos:
  # Fast hygiene checks (whitespace, file endings, conflict markers, TOML/YAML syntax)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  # Typo detection (crate-ci/typos)
  - repo: https://github.com/crate-ci/typos
    rev: bee27e3a4fd1ea2111cf90ab89cd076c870fce14  # frozen: v1.48.0
    hooks:
      - id: typos

  # Validate pyproject.toml against PEP 517/518/621 schemas
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7  # frozen: v0.25
    hooks:
      - id: validate-pyproject

  # Unit tests must pass before lint/type/security hooks run.
  - repo: local
    hooks:
      - id: pytest-docker
        name: pytest (unit tests, docker)
        entry: docker compose run --rm canary sh -lc 'mkdir -p /tmp/canary && COVERAGE_FILE=/tmp/canary/.coverage pytest -ra'
        language: system
        pass_filenames: false

  # Ruff (lint + autofix) + Ruff formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: cb8c523fd4835aba42af70f4cad5568db4df0b6c  # frozen: v0.16.0
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Bandit (Python security linter)
  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
    hooks:
      - id: bandit
        pass_filenames: false
        args: ["-q", "-r", "canary", "-x", "tests", "-s", "B608"]

  # Pip-Audit (Dependency Vulnerabilities)
  - repo: local
    hooks:
      - id: pip-audit-docker
        name: pip-audit (runtime + dev, docker)
        # Audit the already-installed, hash-pinned container environment.
        # This avoids intermittent failures from pip-audit's requirements bootstrap.
        entry: docker compose run --rm -e CANARY_PIP_AUDIT_ALLOW_NETWORK_FAILURE=1 canary python -m canary.devtools.pip_audit_wrapper
        language: system
        pass_filenames: false

  # Pyright (Type checking similar to a compiler)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: 392b6ba8e54be6d603e02e9f8d601d27b7a48d12  # frozen: v1.1.411
    hooks:
      - id: pyright
        additional_dependencies:
          - requests>=2.32.0
          - beautifulsoup4>=4.12.0
          - google-cloud-bigquery>=3.35.0
          - numpy>=1.26
          - pandas>=2.2
          - scikit-learn>=1.5
          - pytest>=7.0
