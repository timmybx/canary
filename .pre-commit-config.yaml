# See https://pre-commit.com for more information
# To install:  pip install pre-commit && pre-commit install
# To run on all files: pre-commit run --all-files

repos:
  # Ruff (lint + autofix) + Ruff formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Bandit (Python security linter)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        pass_filenames: false
        args: ["-q", "-r", "canary", "-x", "tests", "-s", "B608"]

  # Pip-Audit (Dependency Vulnerabilities)
  - repo: local
    hooks:
      - id: pip-audit-docker
        name: pip-audit (runtime + dev, docker)
        # Audit the already-installed, hash-pinned container environment.
        # This avoids intermittent failures from pip-audit's requirements bootstrap.
        entry: docker compose run --rm canary python -m canary.devtools.pip_audit_wrapper
        language: system
        pass_filenames: false

  # Pyright (Type checking similar to a compiler)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
        additional_dependencies:
          - requests>=2.32.0
          - beautifulsoup4>=4.12.0
          - google-cloud-bigquery>=3.35.0
          - numpy>=1.26
          - pandas>=2.2
          - scikit-learn>=1.5
          - pytest>=7.0
