name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR so stale runs don't waste
# CI minutes.  The scheduled run is always allowed to complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (pinned)
        run: |
          # Uses a pinned, hashed lockfile. Generate it with:
          #   python -m piptools compile --generate-hashes --extra dev -o requirements-dev.txt pyproject.toml
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Ruff (format check)
        run: |
          ruff format . --check

      - name: Pyright (type check)
        run: pyright

      - name: Bandit (security lint)
        run: |
          bandit -r canary -q -s B608

      - name: pip-audit (installed env)
        run: python -m canary.devtools.pip_audit_wrapper

      - name: Pytest
        run: |
          pytest --cov-report=xml
