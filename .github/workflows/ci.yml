name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR so stale runs don't waste
# CI minutes.  The scheduled run is always allowed to complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (pinned)
        run: |
          # Uses pinned, hashed lockfiles. Generate them with:
          #   python -m piptools compile --generate-hashes -o requirements.txt pyproject.toml
          #   python -m piptools compile --allow-unsafe --generate-hashes -o requirements-dev.txt requirements-dev.in
          python -m pip install --require-hashes -r requirements.txt
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Ruff (format check)
        run: |
          ruff format . --check

      - name: Pyright (type check)
        run: pyright

      - name: Bandit (security lint)
        run: |
          bandit -r canary -q -s B608

      - name: pip-audit (installed env)
        run: python -m canary.devtools.pip_audit_wrapper

      - name: Pytest
        run: |
          pytest --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Docker is the documented primary workflow (Makefile, compose.yaml, README
  # quickstart), so verify the image actually builds and the installed
  # entrypoints import cleanly.  Without this the image can rot while the
  # plain-Python test job stays green.
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write  # Docker Scout needs this to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t canary:ci .

      - name: Smoke test — CLI entrypoint
        run: docker run --rm canary:ci canary --help

      - name: Smoke test — webapp imports
        run: docker run --rm canary:ci python -c "import canary.webapp"

      - name: Docker Hub login (required for Scout)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@2688993af7bafd6ba8c6a74ec652442be91dd82b # v1.23.1
        with:
          command: cves,recommendations
          image: local://canary:ci
          only-severities: critical,high
          only-fixed: true
          exit-code: true
