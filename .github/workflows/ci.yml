name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (pinned)
        run: |
          # Uses a pinned, hashed lockfile. Generate it with:
          #   python -m piptools compile --generate-hashes --extra dev -o requirements-dev.txt pyproject.toml
          python -m pip install --require-hashes -r requirements-dev.txt

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Ruff (format check)
        run: |
          ruff format . --check

      - name: Pyright (type check)
        run: pyright

      - name: Bandit (security lint)
        run: |
          bandit -r canary -q -s B608

      - name: pip-audit (installed env)
        run: pip-audit

      - name: Pytest
        run: |
          pytest --cov-report=xml
