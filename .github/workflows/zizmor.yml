name: zizmor

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "action.yml"
      - "action.yaml"
      - ".github/workflows/zizmor.yml"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "action.yml"
      - "action.yaml"
      - ".github/workflows/zizmor.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  zizmor:
    name: GitHub Actions security analysis
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.5.0
        with:
          fail-on-severity: high