name: Mutation Testing

# Runs every Monday night and on manual dispatch.  Results are informational —
# a survived mutant is not an immediate blocker, but the trend matters.
# Kill-rate summary is written to the Job Summary tab of each run.
# Download the "mutation-report" artifact for per-file / per-mutant detail.

on:
  schedule:
    - cron: "0 3 * * 1"  # every Monday at 03:00 UTC
  workflow_dispatch:       # allow ad-hoc runs from the Actions tab

permissions:
  contents: read

# Allow only one mutation run at a time (they're expensive).
concurrency:
  group: mutation
  cancel-in-progress: true

jobs:
  mutmut:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime + dev dependencies (pinned)
        run: |
          python -m pip install --require-hashes -r requirements.txt
          python -m pip install --require-hashes -r requirements-dev.txt

      # --no-cov: coverage overhead would make each mutant test run ~10× slower,
      #           and --cov-fail-under in addopts would produce false "killed"
      #           results when a mutant drops coverage below the floor.
      # -p no:cacheprovider: each mutant run gets a fresh cache slot; skip it.
      # -q / --no-header: reduce per-run noise in the CI log.
      # Config in [tool.mutmut] (pyproject.toml) scopes mutation to the
      # scoring and collectors packages — the highest-value targets.
      - name: Run mutation tests
        run: mutmut run || true   # survived mutants are informational, not failures

      - name: Print summary
        if: always()
        run: mutmut results

      - name: Export CI stats (JSON)
        if: always()
        run: mutmut export-cicd-stats

      - name: Write Job Summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib

          stats_file = pathlib.Path("mutmut-cicd-stats.json")
          if not stats_file.exists():
              print("No stats file found — skipping summary.")
              exit(0)

          s = json.loads(stats_file.read_text())
          total   = s.get("total", 0)
          killed  = s.get("killed", 0)
          survived = s.get("survived", 0)
          timeout = s.get("timeout", 0)
          kill_rate = round(100 * killed / total, 1) if total else 0.0

          bar_filled = round(kill_rate / 5)   # 20 blocks = 100%
          bar = "█" * bar_filled + "░" * (20 - bar_filled)

          lines = [
              "## 🧬 Mutation Testing Results",
              "",
              f"| Metric | Value |",
              f"|--------|-------|",
              f"| **Kill rate** | {kill_rate}% |",
              f"| Killed | {killed} |",
              f"| Survived | {survived} |",
              f"| Timeout | {timeout} |",
              f"| Total mutants | {total} |",
              "",
              f"`{bar}` {kill_rate}%",
              "",
              "> Survived mutants are informational — download the artifact for per-file detail.",
          ]

          summary_file = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_file.write_text("\n".join(lines) + "\n")
          print(f"Summary written — kill rate {kill_rate}% ({killed}/{total})")
          EOF

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report-${{ github.run_number }}
          path: mutants/
          retention-days: 30
