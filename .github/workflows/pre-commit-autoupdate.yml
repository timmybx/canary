name: Pre-commit autoupdate

on:
  workflow_dispatch:
  schedule:
    # Daily at 09:00 UTC
    - cron: "0 9 * * *"

# Default to least privilege: keep GITHUB_TOKEN read-only
permissions:
  contents: read

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    environment: pre-commit-autoupdate

    # Keep job token read-only as well (writes happen via PR_BOT_TOKEN)
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Important: don't leave GITHUB_TOKEN creds in the repo; we use PR_BOT_TOKEN later.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install pre-commit
        run: |
          python -m pip install --no-cache-dir --require-hashes -r requirements-ci.txt

      - name: Update pre-commit hooks
        run: |
          pre-commit autoupdate --freeze

      - name: Run pre-commit (all files)
        run: |
          pre-commit run --all-files

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Use the fine-grained PAT you created (repo-scoped) to do the write operations.
          token: ${{ secrets.PR_BOT_TOKEN }}
          branch: chore/pre-commit-autoupdate
          delete-branch: true
          title: "chore: pre-commit autoupdate --freeze"
          commit-message: "chore: pre-commit autoupdate --freeze"
          body: |
            This PR was created automatically by the scheduled workflow.

            It runs `pre-commit autoupdate --freeze` to bump hook revisions in `.pre-commit-config.yaml`
            and then executes `pre-commit run --all-files` to verify hooks still pass.
          labels: |
            dependencies
            automated
