name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 9 * * 4" # weekly (Thu 09:18 UTC) - change if you want
  push:
    branches: ["main"]
  workflow_dispatch:

# Least-privilege at workflow level; job elevates only what it needs.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    environment: scorecard

    permissions:
      contents: read          # checkout + read repo contents
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results / badge via OIDC (Sigstore/Rekor)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          # Prefer a PAT (if configured) so Scorecard can read branch protection/rules reliably.
          repo_token: ${{ secrets['SCORECARD_READ_TOKEN'] != '' && secrets['SCORECARD_READ_TOKEN'] || github.token }}
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
