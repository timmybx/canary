name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 9 * * 4" # weekly (Thu 09:18 UTC) - change if you want
  push:
    branches: ["main"]
  workflow_dispatch:

# Least-privilege at workflow level; job elevates only what it needs.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read          # checkout + read repo contents
      security-events: write  # upload SARIF to code scanning
      id-token: write         # publish results / badge via OIDC (Sigstore/Rekor)

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          # Prefer a PAT (if configured) so Scorecard can read branch protection/rules reliably.
          repo_token: ${{ secrets.SCORECARD_READ_TOKEN != '' && secrets.SCORECARD_READ_TOKEN || github.token }}
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: results.sarif
