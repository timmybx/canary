services:
  canary:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - CANARY_DATA_DIR=/app/data
      - TMPDIR=/tmp
      - RUFF_CACHE_DIR=/tmp/.ruff_cache
      - PIP_DISABLE_PIP_VERSION_CHECK=1
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
    dns:
      - ${DOCKER_DNS_1:-1.1.1.1}
      - ${DOCKER_DNS_2:-8.8.8.8}
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]
    command: ["pytest", "-q"]

  canary-web:
    build: .
    volumes:
      - .:/app:ro
    working_dir: /app
    environment:
      - CANARY_DATA_DIR=/app/data
      - CANARY_WEB_HOST=0.0.0.0
      - CANARY_WEB_PORT=8000
      - TMPDIR=/tmp
      - RUFF_CACHE_DIR=/tmp/.ruff_cache
      - PIP_DISABLE_PIP_VERSION_CHECK=1
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
    dns:
      - ${DOCKER_DNS_1:-1.1.1.1}
      - ${DOCKER_DNS_2:-8.8.8.8}
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    entrypoint: ["sh", "/app/docker-entrypoint.sh"]
    command: ["python", "-m", "canary.webapp"]
    ports:
      - "8000:8000"
